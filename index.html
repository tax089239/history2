    // ===== scenesBootScene.js =====
class BootScene extends Phaser.Scene {
  constructor() { super({ key: 'BootScene' }); }

  preload() {
    this.load.image('frontpage', 'frontpage.png');
    this.load.image('instructions', 'instructions.png');
  }

  create() {
    this.createTextures();
    this.scene.start('MenuScene');
  }

  createTextures() {
    const g = this.add.graphics();

    g.clear();
    g.fillStyle(0x2f855a); g.fillRoundedRect(10, 26, 44, 34, 14);
    g.fillStyle(0xf4c78e); g.fillCircle(32, 24, 17);
    g.fillStyle(0x4a2f2a); g.fillCircle(26, 22, 2); g.fillCircle(38, 22, 2);
    g.lineStyle(2, 0x4a2f2a); g.beginPath(); g.arc(32, 27, 7, 0.2, Math.PI - 0.2); g.strokePath();
    g.fillStyle(0xffd166); g.fillRoundedRect(14, 4, 36, 12, 6); g.fillRect(21, 13, 22, 6);
    g.fillStyle(0xffffff); g.fillCircle(48, 44, 7); g.fillCircle(16, 44, 7);
    g.generateTexture('player', 64, 64);

    g.clear();
    g.fillStyle(0x8d6e63); g.fillCircle(32, 34, 25);
    g.fillStyle(0xf1c7a2); g.fillCircle(32, 26, 17);
    g.fillStyle(0xffffff); g.fillCircle(25, 25, 4); g.fillCircle(39, 25, 4);
    g.fillStyle(0x3e2723); g.fillCircle(25, 25, 2); g.fillCircle(39, 25, 2);
    g.fillStyle(0xffffff); g.fillTriangle(20, 38, 32, 57, 44, 38);
    g.fillStyle(0xffca5c); g.fillTriangle(10, 16, 22, 1, 27, 18); g.fillTriangle(37, 18, 44, 1, 56, 16);
    g.generateTexture('npc_elder', 64, 64);

    g.clear();
    g.fillStyle(0x8bc34a); g.fillCircle(32, 34, 25);
    g.fillStyle(0xb7dc7b);
    [[21,23],[32,18],[43,23],[18,35],[32,32],[46,35],[23,47],[39,47]].forEach(p => g.fillCircle(p[0],p[1],6));
    g.fillStyle(0x263238); g.fillCircle(27,31,2.5); g.fillCircle(38,31,2.5);
    g.lineStyle(2,0x263238); g.beginPath(); g.arc(32,36,7,0.2,Math.PI-0.2); g.strokePath();
    g.fillStyle(0x4f7f25); g.fillTriangle(22,12,32,0,35,14); g.fillTriangle(31,13,47,4,42,18);
    g.generateTexture('npc_baby',64,64);

    g.clear();
    g.fillStyle(0xe7f6ff); g.fillCircle(22,36,16); g.fillCircle(37,28,20); g.fillCircle(52,37,15); g.fillRoundedRect(10,34,54,22,11);
    g.fillStyle(0x1565c0); g.fillCircle(31,37,2.5); g.fillCircle(44,37,2.5);
    g.lineStyle(2,0x1565c0); g.beginPath(); g.arc(38,42,7,0.2,Math.PI-0.2); g.strokePath();
    g.generateTexture('npc_cloud',72,64);

    g.clear();
    g.fillStyle(0x5d4037); g.fillRoundedRect(0,24,128,70,12);
    g.fillStyle(0x7b5b4a); g.fillTriangle(0,28,64,0,128,28);
    g.fillStyle(0xffd166); g.fillRoundedRect(45,42,38,52,10);
    g.fillStyle(0x6d4c41); g.fillCircle(72,68,4);
    g.lineStyle(4,0xffefad); g.strokeRoundedRect(45,42,38,52,10);
    g.generateTexture('temple_door',128,96);

    g.destroy();
  }
}


    // ===== scenesMenuScene.js =====
class MenuScene extends Phaser.Scene {
  constructor() { super({ key: 'MenuScene' }); }

  fitImageCover(image, areaWidth, areaHeight) {
    const texture = image.texture.getSourceImage();
    const scale = Math.max(areaWidth / texture.width, areaHeight / texture.height);
    image.setScale(scale);
    image.setPosition(areaWidth / 2, areaHeight / 2);
    return image;
  }

  create() {
    const { width: w, height: h } = this.scale;
    this.add.rectangle(w / 2, h / 2, w, h, 0x173f46);
    this.fitImageCover(this.add.image(w / 2, h / 2, 'frontpage'), w, h);

    const gearZone = this.add.zone(w * 0.043, h * 0.065, 95, 95)
      .setInteractive({ useHandCursor: true });
    gearZone.on('pointerdown', () => this.openPasswordPanel());

    const startZone = this.add.zone(w / 2, h * 0.855, w * 0.37, h * 0.16)
      .setInteractive({ useHandCursor: true });
    startZone.on('pointerdown', () => this.showInstructions());

    this.input.keyboard.once('keydown-ENTER', () => this.showInstructions());
  }

  showInstructions() {
    if (this.instructionLayer || this.adminLayer) return;
    const { width: w, height: h } = this.scale;
    this.instructionLayer = this.add.container(0, 0).setDepth(100);

    const shade = this.add.rectangle(w / 2, h / 2, w, h, 0x000000, 0.42).setInteractive();
    const page = this.fitImageCover(this.add.image(w / 2, h / 2, 'instructions'), w, h);
    const gearZone = this.add.zone(w * 0.043, h * 0.065, 95, 95)
      .setInteractive({ useHandCursor: true });
    const startZone = this.add.zone(w / 2, h * 0.86, w * 0.38, h * 0.16)
      .setInteractive({ useHandCursor: true });
    const closeZone = this.add.zone(w * 0.686, h * 0.352, 90, 90)
      .setInteractive({ useHandCursor: true });

    gearZone.on('pointerdown', () => this.openPasswordPanel());
    startZone.on('pointerdown', () => this.startGame());
    closeZone.on('pointerdown', () => {
      this.instructionLayer.destroy(true);
      this.instructionLayer = null;
    });

    this.instructionLayer.add([shade, page, gearZone, startZone, closeZone]);
  }

  openPasswordPanel() {
    if (this.adminLayer) return;
    const { width: w, height: h } = this.scale;
    this.adminLayer = this.add.container(0, 0).setDepth(200);

    const shade = this.add.rectangle(w / 2, h / 2, w, h, 0x071a20, 0.76).setInteractive();
    const card = this.add.graphics();
    card.fillStyle(0xfffbef, 1);
    card.fillRoundedRect(w * 0.31, h * 0.22, w * 0.38, h * 0.52, 30);
    card.lineStyle(5, 0xffb703, 1);
    card.strokeRoundedRect(w * 0.31, h * 0.22, w * 0.38, h * 0.52, 30);

    const title = this.add.text(w / 2, h * 0.30, '後台管理登入', {
      fontFamily: 'Microsoft JhengHei', fontSize: '34px', color: '#27454a', fontStyle: 'bold'
    }).setOrigin(0.5);

    const hint = this.add.text(w / 2, h * 0.39, '請輸入 6 位數密碼', {
      fontFamily: 'Microsoft JhengHei', fontSize: '22px', color: '#5d7074'
    }).setOrigin(0.5);

    const displayBox = this.add.rectangle(w / 2, h * 0.49, 300, 68, 0xffffff, 1).setStrokeStyle(3, 0x84b8ad);
    const display = this.add.text(w / 2, h * 0.49, '', {
      fontFamily: 'Microsoft JhengHei', fontSize: '34px', color: '#263b40', letterSpacing: 10
    }).setOrigin(0.5);

    let password = '';
    const updateDisplay = () => display.setText('●'.repeat(password.length));
    const keyHandler = event => {
      if (/^[0-9]$/.test(event.key) && password.length < 6) {
        password += event.key;
        updateDisplay();
      } else if (event.key === 'Backspace') {
        password = password.slice(0, -1);
        updateDisplay();
      } else if (event.key === 'Enter') {
        submit();
      } else if (event.key === 'Escape') {
        close();
      }
    };

    const message = this.add.text(w / 2, h * 0.57, '', {
      fontFamily: 'Microsoft JhengHei', fontSize: '19px', color: '#d64545', fontStyle: 'bold'
    }).setOrigin(0.5);

    const submitButton = this.makeButton(w / 2 - 100, h * 0.66, 180, 58, '登入', 0xffd166, () => submit());
    const closeButton = this.makeButton(w / 2 + 100, h * 0.66, 180, 58, '取消', 0xdfe8e8, () => close());

    const submit = () => {
      if (password === '231600') {
        window.removeEventListener('keydown', keyHandler);
        this.adminLayer.destroy(true);
        this.adminLayer = null;
        this.showAdminDashboard();
      } else {
        message.setText('密碼錯誤，請重新輸入');
        password = '';
        updateDisplay();
      }
    };

    const close = () => {
      window.removeEventListener('keydown', keyHandler);
      this.adminLayer.destroy(true);
      this.adminLayer = null;
    };

    window.addEventListener('keydown', keyHandler);
    this.adminLayer.add([shade, card, title, hint, displayBox, display, message, ...submitButton, ...closeButton]);
  }

  showAdminDashboard() {
    const { width: w, height: h } = this.scale;
    this.adminLayer = this.add.container(0, 0).setDepth(210);
    const stats = this.game.getStats();
    const answered = stats.sessions.filter(s => s.firstAnsweredAt).length;
    const completed = stats.sessions.filter(s => s.completed).length;
    const attempts = stats.sessions.reduce((sum, s) => sum + (s.attempts || 0), 0);

    const shade = this.add.rectangle(w / 2, h / 2, w, h, 0x071a20, 0.80).setInteractive();
    const card = this.add.graphics();
    card.fillStyle(0xfffbef, 1);
    card.fillRoundedRect(w * 0.19, h * 0.11, w * 0.62, h * 0.78, 34);
    card.lineStyle(5, 0xffb703, 1);
    card.strokeRoundedRect(w * 0.19, h * 0.11, w * 0.62, h * 0.78, 34);

    const title = this.add.text(w / 2, h * 0.18, '後台管理設定', {
      fontFamily: 'Microsoft JhengHei', fontSize: '38px', color: '#27454a', fontStyle: 'bold'
    }).setOrigin(0.5);

    const cards = [
      ['答題人數', answered, w * 0.34],
      ['完成闖關', completed, w * 0.50],
      ['總作答次數', attempts, w * 0.66]
    ];
    const items = [];
    cards.forEach(([label, value, x]) => {
      const box = this.add.rectangle(x, h * 0.38, 180, 130, 0xffffff, 1).setStrokeStyle(3, 0x84b8ad);
      const num = this.add.text(x, h * 0.35, String(value), {
        fontFamily: 'Microsoft JhengHei', fontSize: '42px', color: '#e46a1a', fontStyle: 'bold'
      }).setOrigin(0.5);
      const txt = this.add.text(x, h * 0.43, label, {
        fontFamily: 'Microsoft JhengHei', fontSize: '20px', color: '#425b60', fontStyle: 'bold'
      }).setOrigin(0.5);
      items.push(box, num, txt);
    });

    const note = this.add.text(w / 2, h * 0.55,
      '統計資料儲存在目前使用的瀏覽器中\n適合在同一台電腦或平板作為活動闖關機使用', {
        fontFamily: 'Microsoft JhengHei', fontSize: '20px', color: '#5d7074', align: 'center', lineSpacing: 8
      }).setOrigin(0.5);

    const exportBtn = this.makeButton(w / 2 - 165, h * 0.70, 280, 66, '匯出 Excel', 0xffd166, () => {
      const ok = this.game.exportStatsToExcel();
      status.setText(ok ? 'Excel 已開始下載' : 'Excel 元件尚未載入，請重新整理後再試');
    });
    const closeBtn = this.makeButton(w / 2 + 165, h * 0.70, 220, 66, '關閉', 0xdfe8e8, () => {
      this.adminLayer.destroy(true);
      this.adminLayer = null;
    });

    const status = this.add.text(w / 2, h * 0.80, '', {
      fontFamily: 'Microsoft JhengHei', fontSize: '18px', color: '#2f855a', fontStyle: 'bold'
    }).setOrigin(0.5);

    this.adminLayer.add([shade, card, title, ...items, note, ...exportBtn, ...closeBtn, status]);
  }

  makeButton(x, y, width, height, text, color, callback) {
    const box = this.add.rectangle(x, y, width, height, color, 1)
      .setStrokeStyle(3, 0x8a6d2f)
      .setInteractive({ useHandCursor: true });
    const label = this.add.text(x, y, text, {
      fontFamily: 'Microsoft JhengHei', fontSize: '23px', color: '#263238', fontStyle: 'bold'
    }).setOrigin(0.5).setInteractive({ useHandCursor: true });
    box.on('pointerdown', callback);
    label.on('pointerdown', callback);
    return [box, label];
  }

  startGame() {
    this.game.gameState.badges = { elder: false, baby: false, cloud: false };
    this.game.startSession();
    this.cameras.main.fadeOut(250, 18, 50, 58);
    this.time.delayedCall(250, () => this.scene.start('MapScene'));
  }
}


    // ===== scenesMapScene.js =====
class MapScene extends Phaser.Scene {
  constructor(){ super({key:'MapScene'}); }

  create(){
    const {width:w,height:h}=this.scale;
    this.w=w; this.h=h;
    this.cols=11; this.rows=7; this.cell=72;
    this.offsetX=(w-this.cols*this.cell)/2;
    this.offsetY=150;
    this.questionOpening=false;
    this.cameras.main.fadeIn(250,12,40,45);

    this.drawBackground();
    this.maze=this.generateMaze(this.cols,this.rows);
    this.makeMazeEasier();
    this.drawMaze();

    const start=this.cellCenter(0,this.rows-1);
    const finish=this.cellCenter(this.cols-1,0);

    this.exit=this.physics.add.staticSprite(finish.x,finish.y,'temple_door').setScale(.58).setDepth(4);
    this.add.text(finish.x,finish.y+42,'終點',{fontFamily:'Microsoft JhengHei',fontSize:'17px',color:'#4b321d',fontStyle:'bold',backgroundColor:'rgba(255,245,215,.9)',padding:{x:9,y:3}}).setOrigin(.5).setDepth(5);

    this.npcs=this.physics.add.staticGroup();
    const npcCells=this.pickRandomCells(3, [{c:0,r:this.rows-1},{c:this.cols-1,r:0}]);
    const npcDefs=[
      ['npc_elder','elder','石器族長','統一發票',0xffc857],
      ['npc_baby','baby','釋迦寶寶','稅金用途',0x9ccc65],
      ['npc_cloud','cloud','雲端精靈','雲端發票',0x64b5f6]
    ];
    npcDefs.forEach((d,i)=>{
      const p=this.cellCenter(npcCells[i].c,npcCells[i].r);
      this.makeNpc(p.x,p.y,d[0],d[1],d[2],d[3],d[4]);
    });

    this.player=this.physics.add.sprite(start.x,start.y,'player').setScale(.82).setDepth(10);
    this.player.setCollideWorldBounds(true);
    this.player.body.setSize(36,36).setOffset(14,21);

    this.cursors=this.input.keyboard.createCursorKeys();
    this.wasd=this.input.keyboard.addKeys({up:Phaser.Input.Keyboard.KeyCodes.W,down:Phaser.Input.Keyboard.KeyCodes.S,left:Phaser.Input.Keyboard.KeyCodes.A,right:Phaser.Input.Keyboard.KeyCodes.D});

    this.physics.add.collider(this.player,this.walls);
    this.physics.add.overlap(this.player,this.npcs,this.handleNpcTouch,null,this);
    this.physics.add.overlap(this.player,this.exit,this.handleExit,null,this);
    this.createHud();
  }

  drawBackground(){
    const g=this.add.graphics();
    g.fillGradientStyle(0x7ecf74,0x7ecf74,0x4fae6d,0x2f7d50,1);
    g.fillRect(0,0,this.w,this.h);
    g.fillStyle(0x4ca8c9,.95); g.fillRect(0,this.h-32,this.w,32);
    for(let i=0;i<50;i++){
      this.add.circle(Phaser.Math.Between(0,this.w),Phaser.Math.Between(115,this.h-35),Phaser.Math.Between(2,4),Phaser.Utils.Array.GetRandom([0xffffff,0xffe082,0xff8a80]),.7);
    }
  }

  generateMaze(cols,rows){
    const grid=[];
    for(let r=0;r<rows;r++){
      const row=[];
      for(let c=0;c<cols;c++) row.push({c,r,visited:false,walls:{top:true,right:true,bottom:true,left:true}});
      grid.push(row);
    }
    const stack=[];
    let current=grid[rows-1][0]; current.visited=true;
    let visited=1;
    while(visited<cols*rows){
      const neighbors=[];
      const {c,r}=current;
      if(r>0&&!grid[r-1][c].visited) neighbors.push(['top',grid[r-1][c],'bottom']);
      if(c<cols-1&&!grid[r][c+1].visited) neighbors.push(['right',grid[r][c+1],'left']);
      if(r<rows-1&&!grid[r+1][c].visited) neighbors.push(['bottom',grid[r+1][c],'top']);
      if(c>0&&!grid[r][c-1].visited) neighbors.push(['left',grid[r][c-1],'right']);
      if(neighbors.length){
        const [dir,next,opposite]=Phaser.Utils.Array.GetRandom(neighbors);
        current.walls[dir]=false; next.walls[opposite]=false;
        stack.push(current); current=next; current.visited=true; visited++;
      }else current=stack.pop();
    }
    return grid;
  }

  makeMazeEasier(){
    const candidates=[];
    for(let r=0;r<this.rows;r++){
      for(let c=0;c<this.cols;c++){
        if(c<this.cols-1 && this.maze[r][c].walls.right) candidates.push({c,r,dir:'right'});
        if(r<this.rows-1 && this.maze[r][c].walls.bottom) candidates.push({c,r,dir:'bottom'});
      }
    }
    Phaser.Utils.Array.Shuffle(candidates);
    const openings=Math.floor(candidates.length*0.42);
    candidates.slice(0,openings).forEach(item=>{
      const cell=this.maze[item.r][item.c];
      if(item.dir==='right'){
        cell.walls.right=false;
        this.maze[item.r][item.c+1].walls.left=false;
      }else{
        cell.walls.bottom=false;
        this.maze[item.r+1][item.c].walls.top=false;
      }
    });
  }

  drawMaze(){
    this.walls=this.physics.add.staticGroup();
    const wallThickness=7, wallColor=0x6b4423;
    const floor=this.add.graphics();
    floor.fillStyle(0xf2d19b,.98);
    floor.fillRoundedRect(this.offsetX-5,this.offsetY-5,this.cols*this.cell+10,this.rows*this.cell+10,18);

    const addWall=(x,y,width,height)=>{
      const wall=this.add.rectangle(x,y,width,height,wallColor,1).setDepth(3);
      this.physics.add.existing(wall,true); this.walls.add(wall);
    };

    for(let r=0;r<this.rows;r++){
      for(let c=0;c<this.cols;c++){
        const cell=this.maze[r][c];
        const x=this.offsetX+c*this.cell, y=this.offsetY+r*this.cell;
        if(cell.walls.top) addWall(x+this.cell/2,y,this.cell+wallThickness,wallThickness);
        if(cell.walls.left) addWall(x,y+this.cell/2,wallThickness,this.cell+wallThickness);
        if(r===this.rows-1&&cell.walls.bottom) addWall(x+this.cell/2,y+this.cell,this.cell+wallThickness,wallThickness);
        if(c===this.cols-1&&cell.walls.right) addWall(x+this.cell,y+this.cell/2,wallThickness,this.cell+wallThickness);
      }
    }
  }

  cellCenter(c,r){
    return {x:this.offsetX+c*this.cell+this.cell/2,y:this.offsetY+r*this.cell+this.cell/2};
  }

  pickRandomCells(count,excluded){
    const excludedKeys=new Set(excluded.map(p=>`${p.c},${p.r}`));
    const all=[];
    for(let r=0;r<this.rows;r++) for(let c=0;c<this.cols;c++) if(!excludedKeys.has(`${c},${r}`)) all.push({c,r});
    Phaser.Utils.Array.Shuffle(all);
    return all.slice(0,count);
  }

  makeNpc(x,y,texture,id,name,topic,color){
    const npc=this.npcs.create(x,y,texture).setScale(.78).setDepth(7).setData({id,name,topic,busy:false});
    const tween=this.tweens.add({targets:npc,y:y-5,duration:850,yoyo:true,repeat:-1,ease:'Sine.easeInOut'});
    const ring=this.add.circle(x,y,31,color,.18).setStrokeStyle(3,color,.95).setDepth(6);
    const ringTween=this.tweens.add({targets:ring,scale:1.18,alpha:.05,duration:900,yoyo:true,repeat:-1});
    npc.setData('ring',ring);
    npc.setData('tween',tween);
    npc.setData('ringTween',ringTween);
    return npc;
  }

  createHud(){
    const hud=this.add.graphics().setDepth(50);
    hud.fillStyle(0x10343b,.94); hud.fillRoundedRect(18,16,390,96,22);
    hud.lineStyle(3,0xffe49a,.8); hud.strokeRoundedRect(18,16,390,96,22);
    this.uiText=this.add.text(38,32,'',{fontFamily:'Microsoft JhengHei',fontSize:'20px',color:'#ffffff',lineSpacing:7}).setDepth(51);
    this.updateBadgeUI();

    this.add.text(this.w/2,48,'小朋友簡易迷宮・尋找三個租稅關卡',{fontFamily:'Microsoft JhengHei',fontSize:'25px',color:'#fff4bf',fontStyle:'bold',stroke:'#4b321d',strokeThickness:5}).setOrigin(.5).setDepth(51);
    this.promptText=this.add.text(this.w/2,this.h-19,'方向鍵 / WASD 移動；碰到守護者會自動出題',{fontFamily:'Microsoft JhengHei',fontSize:'18px',color:'#ffffff',fontStyle:'bold',backgroundColor:'rgba(16,52,59,.9)',padding:{x:18,y:7}}).setOrigin(.5).setDepth(51);
  }

  update(){
    if(!this.player || this.questionOpening) return;
    const speed=190; this.player.setVelocity(0);
    const left=this.cursors.left.isDown||this.wasd.left.isDown;
    const right=this.cursors.right.isDown||this.wasd.right.isDown;
    const up=this.cursors.up.isDown||this.wasd.up.isDown;
    const down=this.cursors.down.isDown||this.wasd.down.isDown;
    if(left) this.player.setVelocityX(-speed); else if(right) this.player.setVelocityX(speed);
    if(up) this.player.setVelocityY(-speed); else if(down) this.player.setVelocityY(speed);
    if(this.player.body.velocity.length()>0) this.player.body.velocity.normalize().scale(speed);
  }

  handleNpcTouch(player,npc){
    const id=npc.getData('id');
    if(this.questionOpening || npc.getData('busy') || this.game.gameState.badges[id]) return;
    npc.setData('busy',true);
    this.questionOpening=true;
    this.player.setVelocity(0);
    this.scene.pause();
    this.scene.launch('QuestionScene',{npcId:id,npcName:npc.getData('name')});
  }

  completeNpc(id){
    const npc=this.npcs.getChildren().find(item=>item.getData('id')===id);
    if(npc){
      const ring=npc.getData('ring');
      const tween=npc.getData('tween');
      const ringTween=npc.getData('ringTween');
      if(tween) tween.stop();
      if(ringTween) ringTween.stop();
      if(ring) ring.destroy();
      npc.destroy();
    }
    this.questionOpening=false;
    this.updateBadgeUI();
  }

  cancelNpcQuestion(id){
    const npc=this.npcs.getChildren().find(item=>item.getData('id')===id);
    if(npc) npc.setData('busy',false);
    this.questionOpening=false;
  }

  updateBadgeUI(){
    const b=this.game.gameState.badges; const n=[b.elder,b.baby,b.cloud].filter(Boolean).length;
    this.uiText.setText(`租稅任務進度　${n} / 3\n${b.elder?'📜':'○'} 發票　 ${b.baby?'🍍':'○'} 稅金　 ${b.cloud?'☁️':'○'} 載具`);
  }

  handleExit(){
    if(this.exitLocked || this.questionOpening) return;
    const b=this.game.gameState.badges;
    if(b.elder&&b.baby&&b.cloud){
      this.exitLocked=true;
      this.player.setVelocity(0);
      this.game.finishSession();
      this.scene.start('EndScene');
    }else{
      this.exitLocked=true;
      this.promptText.setText('🔒 請先找到並完成三個租稅關卡！');
      this.cameras.main.shake(160,.004);
      this.time.delayedCall(650,()=>{this.exitLocked=false;});
    }
  }
}

class QuestionScene extends Phaser.Scene {
  constructor(){ super({key:'QuestionScene'}); }
  init(data){
    this.npcId=data.npcId;
    this.npcName=data.npcName;
    // 每次開啟新關卡都要重設，否則第二關之後點答案會被直接忽略
    this.resultShown=false;
  }

  create(){
    const {width:w,height:h}=this.scale; this.w=w; this.h=h;
    const q=this.getQuestionData(this.npcId);
    this.add.rectangle(w/2,h/2,w,h,0x071a20,.78).setInteractive();

    const panel=this.add.graphics(); panel.fillStyle(0xfffbef,1); panel.fillRoundedRect(w*.14,h*.08,w*.72,h*.84,34); panel.lineStyle(5,0xffcf5a,1); panel.strokeRoundedRect(w*.14,h*.08,w*.72,h*.84,34);
    this.add.text(w/2,h*.14,`守護者考驗・${this.npcName}`,{fontFamily:'Microsoft JhengHei',fontSize:'30px',color:'#24505a',fontStyle:'bold'}).setOrigin(.5);
    this.add.text(w/2,h*.245,q.question,{fontFamily:'Microsoft JhengHei',fontSize:'30px',color:'#263b40',fontStyle:'bold',align:'center',wordWrap:{width:w*.61},lineSpacing:10}).setOrigin(.5);

    q.options.forEach((opt,i)=>{
      const y=h*(.43+i*.135);
      const box=this.add.rectangle(w/2,y,w*.58,76,0xffffff,1).setStrokeStyle(3,0x84b8ad).setInteractive({useHandCursor:true});
      const label=this.add.text(w*.25,y,`${String.fromCharCode(65+i)}　${opt}`,{fontFamily:'Microsoft JhengHei',fontSize:'24px',color:'#29474d',fontStyle:'bold'}).setOrigin(0,.5);
      const choose=()=>this.checkAnswer(i,q.answer,q.explanation);
      box.on('pointerdown',choose); label.setInteractive({useHandCursor:true}).on('pointerdown',choose);
      box.on('pointerover',()=>{box.setFillStyle(0xfff2bd); box.setStrokeStyle(4,0xffb703);});
      box.on('pointerout',()=>{box.setFillStyle(0xffffff); box.setStrokeStyle(3,0x84b8ad);});
    });
    this.add.text(w/2,h*.86,'碰到關卡就會自動出題，親子一起選答案！',{fontFamily:'Microsoft JhengHei',fontSize:'19px',color:'#61777b'}).setOrigin(.5);
  }

  getQuestionData(id){
    return {
      elder:{question:'買東西時索取統一發票，有哪些好處？',options:['可以參加定期對獎','可以證明交易並幫助稅收管理','以上皆是'],answer:2,explanation:'發票能證明交易、幫助誠實納稅，也能參加對獎喔！'},
      baby:{question:'大家繳的稅金，主要會用在哪裡？',options:['公園、學校、道路與醫療服務','只拿來買零食','全部藏進神殿寶箱'],answer:0,explanation:'稅金會用在公共建設、教育、醫療等大家共享的服務。'},
      cloud:{question:'使用雲端發票（載具）有什麼優點？',options:['減少紙張，也比較不容易弄丟','系統可以自動幫忙對獎','以上都是'],answer:2,explanation:'雲端發票方便、環保，還能自動對獎！'}
    }[id];
  }

  checkAnswer(selected,correct,explanation){
    if(this.resultShown) return;
    this.resultShown=true;
    const success=selected===correct;
    this.game.recordAnswer(this.npcId,success);
    if(success){
      this.game.gameState.badges[this.npcId]=true;
      this.showResult(true,'答對了！','這個關卡完成，守護者將從迷宮消失！',explanation);
    } else {
      this.showResult(false,'再想一想','這個答案還不對，再討論一次吧！','');
    }
  }

  showResult(success,title,subtitle,explanation){
    const w=this.w,h=this.h;
    this.add.rectangle(w/2,h/2,w,h,0x071a20,.82).setDepth(20).setInteractive();
    const card=this.add.graphics().setDepth(21); card.fillStyle(success?0xeafaf0:0xfff0f0,1); card.fillRoundedRect(w*.27,h*.24,w*.46,h*.5,32); card.lineStyle(5,success?0x4caf78:0xef7c8e,1); card.strokeRoundedRect(w*.27,h*.24,w*.46,h*.5,32);
    this.add.text(w/2,h*.33,success?'🎉':'💡',{fontSize:'62px'}).setOrigin(.5).setDepth(22);
    this.add.text(w/2,h*.43,title,{fontFamily:'Microsoft JhengHei',fontSize:'36px',color:'#27454a',fontStyle:'bold'}).setOrigin(.5).setDepth(22);
    this.add.text(w/2,h*.51,subtitle,{fontFamily:'Microsoft JhengHei',fontSize:'22px',color:'#4b6266'}).setOrigin(.5).setDepth(22);
    if(explanation) this.add.text(w/2,h*.585,explanation,{fontFamily:'Microsoft JhengHei',fontSize:'19px',color:'#4b6266',align:'center',wordWrap:{width:w*.36}}).setOrigin(.5).setDepth(22);
    const btn=this.add.text(w/2,h*.68,success?'繼續走迷宮':'重新作答',{fontFamily:'Microsoft JhengHei',fontSize:'23px',color:'#263238',fontStyle:'bold',backgroundColor:success?'#ffd166':'#ffb5c0',padding:{x:32,y:14}}).setOrigin(.5).setDepth(22).setInteractive({useHandCursor:true});
    btn.on('pointerdown',()=>{
      const map=this.scene.get('MapScene');
      if(success){
        map.completeNpc(this.npcId);
        this.scene.resume('MapScene');
        this.scene.stop('QuestionScene');
      } else {
        this.scene.restart({npcId:this.npcId,npcName:this.npcName});
      }
    });
  }
}

    // ===== game.js =====
const config = {
  type: Phaser.AUTO,
  parent: 'game-container',
  width: 1600,
  height: 1000,
  backgroundColor: '#173f46',
  antialias: true,
  pixelArt: false,
  scale: {
    mode: Phaser.Scale.FIT,
    autoCenter: Phaser.Scale.CENTER_BOTH,
    width: 1600,
    height: 1000
  },
  physics: {
    default: 'arcade',
    arcade: { gravity: { y: 0 }, debug: false }
  },
  scene: [BootScene, MenuScene, MapScene, QuestionScene, EndScene]
};

const game = new Phaser.Game(config);

const STORAGE_KEY = 'prehistoricTaxGameStatsV2';

game.gameState = {
  badges: { elder: false, baby: false, cloud: false },
  currentSession: null
};

game.getStats = function () {
  try {
    const data = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (data && Array.isArray(data.sessions)) return data;
  } catch (error) {
    console.warn('讀取統計資料失敗：', error);
  }
  return { sessions: [] };
};

game.saveStats = function (stats) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(stats));
};

game.startSession = function () {
  const now = new Date();
  game.gameState.currentSession = {
    id: `${now.getTime()}-${Math.random().toString(36).slice(2, 8)}`,
    startedAt: now.toISOString(),
    firstAnsweredAt: '',
    completedAt: '',
    answeredQuestions: [],
    correctAnswers: 0,
    attempts: 0,
    completed: false,
    saved: false
  };
};

game.recordAnswer = function (questionId, isCorrect) {
  const session = game.gameState.currentSession;
  if (!session) return;
  if (!session.firstAnsweredAt) session.firstAnsweredAt = new Date().toISOString();
  session.attempts += 1;
  if (isCorrect) {
    session.correctAnswers += 1;
    if (!session.answeredQuestions.includes(questionId)) session.answeredQuestions.push(questionId);
  }
  const stats = game.getStats();
  const index = stats.sessions.findIndex(item => item.id === session.id);
  const snapshot = { ...session };
  if (index >= 0) stats.sessions[index] = snapshot;
  else stats.sessions.push(snapshot);
  game.saveStats(stats);
};

game.finishSession = function () {
  const session = game.gameState.currentSession;
  if (!session || session.saved) return;
  session.completed = true;
  session.completedAt = new Date().toISOString();
  session.saved = true;
  const stats = game.getStats();
  const index = stats.sessions.findIndex(item => item.id === session.id);
  const snapshot = { ...session };
  if (index >= 0) stats.sessions[index] = snapshot;
  else stats.sessions.push(snapshot);
  game.saveStats(stats);
};

game.exportStatsToExcel = function () {
  const stats = game.getStats();
  const answered = stats.sessions.filter(s => s.firstAnsweredAt).length;
  const completed = stats.sessions.filter(s => s.completed).length;
  const attempts = stats.sessions.reduce((sum, s) => sum + (s.attempts || 0), 0);

  const summary = [
    { 項目: '答題人數', 數值: answered },
    { 項目: '完成闖關人數', 數值: completed },
    { 項目: '總作答次數', 數值: attempts },
    { 項目: '匯出時間', 數值: new Date().toLocaleString('zh-TW') }
  ];

  const records = stats.sessions.map((s, index) => ({
    編號: index + 1,
    工作階段ID: s.id,
    開始時間: s.startedAt ? new Date(s.startedAt).toLocaleString('zh-TW') : '',
    首次答題時間: s.firstAnsweredAt ? new Date(s.firstAnsweredAt).toLocaleString('zh-TW') : '',
    完成時間: s.completedAt ? new Date(s.completedAt).toLocaleString('zh-TW') : '',
    是否完成: s.completed ? '是' : '否',
    完成關卡數: Array.isArray(s.answeredQuestions) ? s.answeredQuestions.length : 0,
    答對次數: s.correctAnswers || 0,
    作答次數: s.attempts || 0
  }));

  if (window.XLSX) {
    const workbook = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(workbook, XLSX.utils.json_to_sheet(summary), '統計摘要');
    XLSX.utils.book_append_sheet(workbook, XLSX.utils.json_to_sheet(records), '答題紀錄');
    XLSX.writeFile(workbook, `史前稅遊記_答題統計_${new Date().toISOString().slice(0, 10)}.xlsx`);
    return true;
  }

  console.error('Excel 匯出元件尚未載入');
  return false;
};

window.addEventListener('resize', () => game.scale.refresh());
